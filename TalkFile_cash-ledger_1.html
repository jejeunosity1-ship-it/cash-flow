<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>지출장부</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
// gstatic이 막히거나 느려서 안 불러와졌으면 jsdelivr에서 동기적으로 재시도
if (typeof firebase === 'undefined' || !firebase.database) {
  document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/firebase@9.22.2/firebase-app-compat.js"><\/scr'+'ipt>');
  document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/firebase@9.22.2/firebase-database-compat.js"><\/scr'+'ipt>');
}
</script>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

  :root{
    --bg:#FBFAF6;
    --surface:#FFFFFF;
    --ink:#211E1A;
    --ink-soft:#6B655C;
    --muted:#9B948A;
    --line:#ECE7DD;
    --line-strong:#DED7C9;
    --accent:#16695B;
    --accent-soft:#E4F0EC;
    --danger:#C0492F;
    --danger-soft:#F6E6E1;
    --shadow:0 1px 2px rgba(33,30,26,.04),0 8px 24px rgba(33,30,26,.06);
    --radius:16px;
    --radius-sm:11px;
    --num:'Pretendard Variable',Pretendard,-apple-system,system-ui,sans-serif;
    --font:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--font);
    background:var(--bg);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    font-feature-settings:"tnum";
  }
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:16px}

  .app{max-width:560px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:96px}

  /* ---------- HEADER ---------- */
  .top{position:sticky;top:0;z-index:20;background:rgba(251,250,246,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .top-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px}
  .brand{display:flex;flex-direction:column;gap:1px}
  .brand h1{margin:0;font-size:19px;font-weight:800;letter-spacing:-.02em}
  .brand .sub{font-size:11.5px;color:var(--muted);font-weight:600;letter-spacing:.04em}
  .top-actions{display:flex;gap:6px}
  .icon-btn{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);transition:background .15s}
  .icon-btn:hover{background:var(--line)}
  .icon-btn svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}

  /* ---------- MONTH + SUMMARY ---------- */
  .month-nav{display:flex;align-items:center;justify-content:center;gap:18px;padding:8px 0 2px}
  .month-nav button{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink-soft)}
  .month-nav button:hover{background:var(--line)}
  .month-nav .label{font-size:15px;font-weight:700;min-width:96px;text-align:center;letter-spacing:.01em}
  .month-nav svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}

  .summary{margin:8px 16px 4px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 20px 16px;overflow:hidden}
  .summary .cap{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.06em}
  .summary .total{font-size:34px;font-weight:800;letter-spacing:-.03em;margin:2px 0 14px;display:flex;align-items:baseline;gap:4px}
  .summary .total .won{font-size:20px;font-weight:700;color:var(--ink-soft)}
  .summary .total .count{margin-left:auto;font-size:12.5px;font-weight:600;color:var(--muted);align-self:flex-end;padding-bottom:5px}

  .breakdown{display:flex;flex-direction:column;gap:11px}
  .bd-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center}
  .bd-name{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;white-space:nowrap}
  .bd-dot{width:9px;height:9px;border-radius:3px;flex:none}
  .bd-bar{height:7px;border-radius:99px;background:var(--line);overflow:hidden}
  .bd-bar > i{display:block;height:100%;border-radius:99px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .bd-amt{font-size:12.5px;font-weight:700;color:var(--ink-soft);white-space:nowrap}

  /* ---------- LIST ---------- */
  .day-group{margin:18px 16px 0}
  .day-head{display:flex;align-items:baseline;justify-content:space-between;padding:0 4px 8px;border-bottom:1px solid var(--line)}
  .day-head .d{font-size:13.5px;font-weight:700}
  .day-head .dow{font-size:11.5px;color:var(--muted);font-weight:600;margin-left:6px}
  .day-head .dsum{font-size:12.5px;font-weight:700;color:var(--ink-soft)}

  .entry{display:flex;align-items:center;gap:13px;padding:13px 4px 13px 11px;border-bottom:1px solid var(--line);border-left:3px solid transparent;transition:background .12s;cursor:pointer}
  .entry:active{background:var(--line)}
  .entry:last-child{border-bottom:none}
  .entry.pending{background:#FBF3E7;border-left-color:#C77D3A}
  .entry.pending:active{background:#F5E7D2}
  .e-dot{width:40px;height:40px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff}
  .e-mid{flex:1;min-width:0}
  .e-cat{font-size:14.5px;font-weight:700;letter-spacing:-.01em}
  .e-meta{font-size:12px;color:var(--muted);font-weight:500;margin-top:1px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .e-sub{color:var(--ink-soft);font-weight:600}
  .e-clip{display:inline-flex;align-items:center;gap:3px;color:var(--accent);font-weight:600}
  .e-clip svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none}
  .e-amt{font-size:16px;font-weight:800;letter-spacing:-.02em;white-space:nowrap}

  .empty{text-align:center;padding:64px 30px;color:var(--muted)}
  .empty .big{font-size:40px;margin-bottom:12px}
  .empty .t{font-size:15px;font-weight:700;color:var(--ink-soft)}
  .empty .s{font-size:13px;margin-top:5px;line-height:1.6}

  /* ---------- FAB ---------- */
  .fab{position:fixed;left:50%;transform:translateX(-50%);bottom:24px;z-index:30;
    background:var(--accent);color:#fff;border-radius:99px;height:54px;padding:0 26px 0 22px;
    display:flex;align-items:center;gap:9px;font-size:15.5px;font-weight:700;letter-spacing:-.01em;
    box-shadow:0 6px 20px rgba(22,105,91,.34),0 2px 6px rgba(22,105,91,.2);transition:transform .15s,box-shadow .15s}
  .fab:active{transform:translateX(-50%) scale(.96)}
  .fab svg{width:22px;height:22px;stroke:currentColor;stroke-width:2.4;fill:none;stroke-linecap:round}

  /* ---------- SHEET / MODAL ---------- */
  .scrim{position:fixed;inset:0;background:rgba(33,30,26,.42);z-index:40;opacity:0;pointer-events:none;transition:opacity .25s}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;max-width:560px;margin:0 auto;
    background:var(--bg);border-radius:22px 22px 0 0;box-shadow:0 -8px 40px rgba(33,30,26,.18);
    transform:translateY(100%);transition:transform .32s cubic-bezier(.2,.85,.2,1);
    max-height:94vh;display:flex;flex-direction:column}
  .sheet.show{transform:translateY(0)}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;flex:none}
  .sheet-head h2{margin:0;font-size:17px;font-weight:800;letter-spacing:-.02em}
  .sheet-head .x{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft)}
  .sheet-head .x:hover{background:var(--line)}
  .sheet-head .x svg{width:21px;height:21px;stroke:currentColor;stroke-width:2.1;fill:none;stroke-linecap:round}
  .sheet-body{overflow-y:auto;padding:4px 18px 20px;-webkit-overflow-scrolling:touch}
  .sheet-foot{flex:none;padding:12px 18px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:var(--bg);display:flex;gap:10px}

  /* ---------- FORM ---------- */
  .field{margin-top:18px}
  .field > label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-soft);letter-spacing:.02em;margin-bottom:8px}
  .amount-wrap{display:flex;align-items:center;background:var(--surface);border:1.5px solid var(--line-strong);border-radius:14px;padding:0 16px;transition:border-color .15s}
  .amount-wrap:focus-within{border-color:var(--accent)}
  .amount-wrap .pre{font-size:26px;font-weight:700;color:var(--muted)}
  .amount-wrap input{flex:1;border:none;outline:none;background:none;font-size:30px;font-weight:800;letter-spacing:-.02em;padding:14px 6px;text-align:right;color:var(--ink)}
  .amount-wrap .won{font-size:18px;font-weight:700;color:var(--ink-soft)}

  .inp{width:100%;background:var(--surface);border:1.5px solid var(--line-strong);border-radius:12px;padding:13px 14px;outline:none;color:var(--ink);transition:border-color .15s}
  .inp:focus{border-color:var(--accent)}
  textarea.inp{resize:none;min-height:64px;line-height:1.5}
  input[type=date].inp{appearance:none;-webkit-appearance:none}

  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chips.seg2{flex-wrap:nowrap}
  .chips.seg2 .chip{flex:1;justify-content:center}
  .chip{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:11px;background:var(--surface);border:1.5px solid var(--line-strong);font-size:13.5px;font-weight:600;color:var(--ink-soft);transition:all .14s}
  .chip .cdot{width:9px;height:9px;border-radius:3px;flex:none}
  .chip.on{border-color:transparent;color:#fff;font-weight:700}
  .chip.add{border-style:dashed;color:var(--muted)}
  .chip.add svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.4;fill:none;stroke-linecap:round}

  /* type / method / status tags in list */
  .e-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700}
  .e-tag svg{width:11px;height:11px;stroke:currentColor;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .e-tag.income{background:var(--accent-soft);color:var(--accent)}
  .e-tag.pending{background:#C77D3A;color:#fff}
  .e-tag.done{background:var(--accent-soft);color:var(--accent);opacity:.75}
  .e-tag.method{background:var(--line);color:var(--ink-soft);font-weight:600}
  .e-amt.income{color:var(--accent)}
  .e-amt.pending{color:#C77D3A}

  .subhint{font-size:12px;color:var(--muted);margin-top:9px;font-weight:500}

  /* photo area */
  .photo-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:2px}
  .photo-thumb{position:relative;width:84px;height:84px;border-radius:13px;overflow:hidden;background:var(--line);border:1px solid var(--line)}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .photo-thumb .rm{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(33,30,26,.62);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1}
  .photo-add{width:84px;height:84px;border-radius:13px;border:1.5px dashed var(--line-strong);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:var(--muted)}
  .photo-add svg{width:24px;height:24px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .photo-add span{font-size:11px;font-weight:700}

  /* ---------- BUTTONS ---------- */
  .btn{flex:1;border-radius:13px;padding:15px;font-size:15.5px;font-weight:700;letter-spacing:-.01em;text-align:center;transition:transform .12s,opacity .12s}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(22,105,91,.24)}
  .btn-primary:disabled{opacity:.4;box-shadow:none}
  .btn-ghost{background:var(--surface);border:1.5px solid var(--line-strong);color:var(--ink-soft);flex:0 0 auto;padding:15px 20px}
  .btn-danger-ghost{background:var(--danger-soft);color:var(--danger);flex:0 0 auto;padding:15px 18px}

  /* ---------- CATEGORY MANAGER ---------- */
  .cat-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px 16px;margin-top:12px}
  .cat-card-head{display:flex;align-items:center;gap:10px}
  .cat-card-head .cdot{width:13px;height:13px;border-radius:4px;flex:none}
  .cat-card-head .cname{font-size:15.5px;font-weight:800;flex:1;letter-spacing:-.01em}
  .cat-card-head .mini{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
  .cat-card-head .mini:hover{background:var(--line);color:var(--ink-soft)}
  .cat-card-head .mini svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .sub-list{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}
  .sub-tag{display:inline-flex;align-items:center;gap:6px;padding:7px 10px 7px 12px;border-radius:9px;background:var(--bg);border:1px solid var(--line);font-size:13px;font-weight:600}
  .sub-tag .del{color:var(--muted);font-size:15px;line-height:1;padding:0 1px}
  .sub-tag .del:hover{color:var(--danger)}
  .sub-add-row{display:flex;gap:8px;margin-top:11px}
  .sub-add-row input{flex:1;background:var(--bg);border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;outline:none;font-size:14px}
  .sub-add-row input:focus{border-color:var(--accent)}
  .sub-add-row button{flex:none;background:var(--accent-soft);color:var(--accent);border-radius:10px;padding:0 16px;font-weight:700;font-size:14px}
  .no-sub{font-size:12.5px;color:var(--muted);margin-top:11px;font-weight:500}

  .add-cat-btn{width:100%;margin-top:14px;border:1.5px dashed var(--line-strong);border-radius:14px;padding:15px;color:var(--ink-soft);font-weight:700;font-size:14.5px;background:var(--surface);display:flex;align-items:center;justify-content:center;gap:8px}
  .add-cat-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.3;fill:none;stroke-linecap:round}

  .swatches{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
  .sw{width:34px;height:34px;border-radius:10px;position:relative;transition:transform .12s}
  .sw:active{transform:scale(.9)}
  .sw.on::after{content:'';position:absolute;inset:-4px;border-radius:13px;border:2.5px solid var(--ink)}

  /* menu popover */
  .menu{position:absolute;top:54px;right:16px;z-index:35;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:6px;min-width:188px;display:none}
  .menu.show{display:block}
  .menu button{display:flex;align-items:center;gap:11px;width:100%;padding:11px 12px;border-radius:9px;font-size:14px;font-weight:600;color:var(--ink);text-align:left}
  .menu button:hover{background:var(--line)}
  .menu button svg{width:17px;height:17px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round;color:var(--ink-soft)}
  .menu .sep{height:1px;background:var(--line);margin:5px 8px}

  /* photo viewer */
  .viewer{position:fixed;inset:0;z-index:80;background:rgba(20,18,15,.94);display:none;align-items:center;justify-content:center;flex-direction:column}
  .viewer.show{display:flex}
  .viewer img{max-width:94vw;max-height:80vh;border-radius:10px;object-fit:contain}
  .viewer .vclose{position:absolute;top:18px;right:18px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.14);color:#fff;display:flex;align-items:center;justify-content:center}
  .viewer .vclose svg{width:24px;height:24px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round}
  .viewer .vnav{position:absolute;bottom:30px;display:flex;gap:8px}
  .viewer .vdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.34)}
  .viewer .vdot.on{background:#fff}

  /* toast */
  .toast{position:fixed;left:50%;bottom:92px;transform:translate(-50%,16px);z-index:90;
    background:var(--ink);color:#fff;padding:12px 20px;border-radius:99px;font-size:14px;font-weight:600;
    box-shadow:0 8px 24px rgba(0,0,0,.22);opacity:0;pointer-events:none;transition:all .26s;white-space:nowrap}
  .toast.show{opacity:1;transform:translate(-50%,0)}

  .danger-text{color:var(--danger)}
  .hidden-input{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="top-inner">
      <div class="brand">
        <h1>지출장부</h1>
        <span class="sub">CASH LEDGER · JEJEUNOSITY</span>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="btnCats" title="카테고리 관리" aria-label="카테고리 관리">
          <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/><circle cx="19" cy="18" r="1.6"/></svg>
        </button>
        <button class="icon-btn" id="btnMenu" title="더보기" aria-label="더보기">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg>
        </button>
      </div>
    </div>
    <div class="month-nav">
      <button id="prevM" aria-label="이전 달"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>
      <div class="label num" id="monthLabel">—</div>
      <button id="nextM" aria-label="다음 달"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>
  </div>

  <div class="menu" id="menu">
    <button id="mExportCsv"><svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>엑셀(CSV) 내보내기</button>
    <button id="mBackup"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-3-6.7"/><path d="M21 3v5h-5"/></svg>전체 백업 (JSON)</button>
    <button id="mRestore"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 113 6.7"/><path d="M3 21v-5h5"/></svg>백업 불러오기</button>
  </div>

  <div id="summary"></div>
  <div id="list"></div>
</div>

<button class="fab" id="fab">
  <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
  지출 추가
</button>

<!-- ENTRY SHEET -->
<div class="scrim" id="scrimEntry"></div>
<div class="sheet" id="sheetEntry">
  <div class="sheet-head">
    <h2 id="entryTitle">지출 추가</h2>
    <button class="x" id="closeEntry" aria-label="닫기"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
  </div>
  <div class="sheet-body">
    <div class="field">
      <label>구분</label>
      <div class="chips seg2" id="typeChips"></div>
    </div>

    <div class="field">
      <label>금액</label>
      <div class="amount-wrap">
        <span class="pre">₩</span>
        <input id="amount" class="num" inputmode="numeric" placeholder="0" autocomplete="off">
      </div>
    </div>

    <div class="field">
      <label>날짜</label>
      <input type="date" id="date" class="inp">
    </div>

    <div class="field">
      <label>결제수단</label>
      <div class="chips seg2" id="methodChips"></div>
    </div>

    <div class="field">
      <label>결제상태</label>
      <div class="chips seg2" id="statusChips"></div>
    </div>

    <div class="field">
      <label>카테고리</label>
      <div class="chips" id="catChips"></div>
    </div>

    <div class="field" id="subField" style="display:none">
      <label id="subLabel">세부항목</label>
      <div class="chips" id="subChips"></div>
      <div class="subhint" id="subHint"></div>
    </div>

    <div class="field">
      <label>메모 <span style="color:var(--muted);font-weight:500">(선택)</span></label>
      <textarea id="memo" class="inp" placeholder="내용을 적어두면 나중에 찾기 쉬워요"></textarea>

<script>
/* ============================================================
   지출장부  ·  cash ledger
   저장: IndexedDB (브라우저 안에 영구 저장 · 서버 불필요)
        → GitHub Pages / 로컬 파일 모두에서 동작
        → 기기·환경 간 이동은 메뉴의 'JSON 백업/불러오기' 사용
   키 구조
   - ledger:categories         카테고리 목록
   - ledger:entries            지출 기록 (사진 제외)
   - ledger:photo:<id>         기록별 사진 배열 (base64)
   ============================================================ */

const PALETTE = ['#16695B','#C77D3A','#7A5BA6','#3A7CA5','#C0567E','#5B9A4A','#B0843A','#D5564B','#3E8E7E','#8B857C'];

const DEFAULT_CATEGORIES = [
  {name:'공장별 공임',       color:'#16695B'},
  {name:'원단처',           color:'#C77D3A'},
  {name:'디자이너 샘플 시재', color:'#7A5BA6'},
  {name:'화물비',           color:'#3A7CA5'},
  {name:'샘플의류구매',      color:'#C0567E'},
  {name:'식대',             color:'#5B9A4A'},
  {name:'비품비',           color:'#B0843A'},
  {name:'기타',             color:'#8B857C'},
].map(c => ({ id:uid(), name:c.name, color:c.color, subitems:[] }));

/* ---------- state ---------- */
let categories = [];
let entries = [];
let viewMonth = new Date();
let editingId = null;          // 수정 중인 entry id
let selCat = null;             // 선택된 카테고리 id
let selSub = null;             // 선택된 세부항목 id
let selType = 'expense';       // 'expense' | 'income'
let selMethod = 'cash';        // 'cash' | 'other'
let selStatus = 'done';        // 'done' | 'pending'
let pendingPhotos = [];        // base64[]
let photosDirty = false;
let editingCatId = null;       // 카테고리 편집 중 id
let catEditColor = PALETTE[0];

/* ---------- Firebase (리오더앱과 같은 프로젝트, 별도 경로 ledger/ 사용) ---------- */
const firebaseConfig = {
  apiKey: "AIzaSyDTfiNbbleGz69wr8dYqlOp1vyl3-l3sxY",
  authDomain: "jejeunosity-reorder.firebaseapp.com",
  databaseURL: "https://jejeunosity-reorder-default-rtdb.firebaseio.com",
  projectId: "jejeunosity-reorder",
  storageBucket: "jejeunosity-reorder.firebasestorage.app",
  messagingSenderId: "1005352974921",
  appId: "1:1005352974921:web:5d803723c5713e08bb5d98"
};
let fbDb=null, catRef=null, entRef=null, phRef=null;
let cloudConnected = true; // 실제 클라우드 연결 여부 — 거짓 "동기화됨" 표시 방지용
try{
  if(typeof firebase==='undefined' || !firebase.database) throw new Error('Firebase 스크립트 로드 실패');
  firebase.initializeApp(firebaseConfig);
  fbDb = firebase.database();
  catRef = fbDb.ref('ledger/categories');
  entRef = fbDb.ref('ledger/entries');
  phRef  = fbDb.ref('ledger/photos');
}catch(e){
  console.warn('Firebase 초기화 실패, 이 기기는 로컬 전용으로 동작합니다:', e.message);
  cloudConnected = false;
}
function showOfflineBanner(msg){
  let b = document.getElementById('offlineBanner');
  if(!b){
    b = document.createElement('div'); b.id='offlineBanner';
    b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:200;background:#C0492F;color:#fff;text-align:center;font-size:12px;font-weight:700;padding:7px 10px;';
    document.body.appendChild(b);
  }
  b.textContent = msg;
}
function hideOfflineBanner(){ const b=document.getElementById('offlineBanner'); if(b) b.remove(); }
function objToArr(obj){ return obj ? Object.keys(obj).map(k=>obj[k]) : []; }
function syncCat(c){ if(cloudConnected && c && catRef) catRef.child(c.id).set(c).catch(err=>{ console.warn('카테고리 동기화 실패', err); toast('⚠️ 동기화 실패 — 이 기기에만 저장됐어요'); }); }
function syncEntry(e){ if(cloudConnected && e && entRef) entRef.child(e.id).set(e).catch(err=>{ console.warn('지출기록 동기화 실패', err); toast('⚠️ 동기화 실패 — 이 기기에만 저장됐어요'); }); }

/* ---------- storage : IndexedDB (key-value) ---------- */
const DB_NAME='jejeunosity-ledger', DB_STORE='kv';
let _db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains(DB_STORE)) r.result.createObjectStore(DB_STORE); };
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
async function db(){ if(!_db) _db=await openDB(); return _db; }
async function sGet(k){
  try{ const d=await db();
    return await new Promise(res=>{ const q=d.transaction(DB_STORE,'readonly').objectStore(DB_STORE).get(k);
      q.onsuccess=()=>res(q.result==null?null:q.result); q.onerror=()=>res(null); });
  }catch(e){ return null; }
}
async function sSet(k,v){
  const d=await db();
  return new Promise((res,rej)=>{ const q=d.transaction(DB_STORE,'readwrite').objectStore(DB_STORE).put(v,k);
    q.onsuccess=()=>res(true); q.onerror=()=>rej(q.error); });
}
async function sDel(k){
  try{ const d=await db();
    return await new Promise(res=>{ const q=d.transaction(DB_STORE,'readwrite').objectStore(DB_STORE).delete(k);
      q.onsuccess=()=>res(true); q.onerror=()=>res(false); });
  }catch(e){}
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function el(id){ return document.getElementById(id); }

/* ---------- formatting ---------- */
function fmt(n){ return (n||0).toLocaleString('ko-KR'); }
function ymd(d){ const z=x=>String(x).padStart(2,'0'); return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }
function monthKey(d){ const z=x=>String(x).padStart(2,'0'); return d.getFullYear()+'-'+z(d.getMonth()+1); }
const DOW=['일','월','화','수','목','금','토'];
function prettyDate(str){
  const d=new Date(str+'T00:00:00');
  return { day:(d.getMonth()+1)+'월 '+d.getDate()+'일', dow:DOW[d.getDay()] };
}

/* ============================================================
   INIT
   ============================================================ */
async function init(){
  const c = await sGet('ledger:categories');
  if(c){ try{ categories = JSON.parse(c); }catch(e){ categories=[]; } }
  if(!categories || !categories.length){
    categories = DEFAULT_CATEGORIES;
    await sSet('ledger:categories', JSON.stringify(categories));
  }
  const e = await sGet('ledger:entries');
  if(e){ try{ entries = JSON.parse(e); }catch(_){ entries=[]; } }
  renderAll();
  bind();
  if(cloudConnected) attachCloudSync();
  else showOfflineBanner('⚠️ 클라우드 연결 실패 — 이 기기는 다른 기기와 동기화되지 않아요');
}

function attachCloudSync(){
  catRef.on('value', snap=>{
    const val = snap.val();
    let arr = objToArr(val);
    if(!arr.length){
      // 클라우드에 아직 아무것도 없으면(최초 연결) 로컬 기본 카테고리를 올려서 시작
      arr = categories && categories.length ? categories : DEFAULT_CATEGORIES;
      arr.forEach(c=> catRef.child(c.id).set(c));
    }
    categories = arr;
    saveCategories();
    renderCatManager(); renderCatChips(); renderSubChips(); renderAll();
    hideOfflineBanner();
  }, err=>{ console.warn('카테고리 동기화 오류', err); showOfflineBanner('⚠️ 동기화 연결이 끊겼어요 — 오프라인으로 계속 사용 가능해요'); });

  entRef.on('value', snap=>{
    const val = snap.val();
    entries = objToArr(val);
    saveEntries();
    renderAll();
    hideOfflineBanner();
  }, err=>{ console.warn('지출기록 동기화 오류', err); showOfflineBanner('⚠️ 동기화 연결이 끊겼어요 — 오프라인으로 계속 사용 가능해요'); });
}

async function saveCategories(){ await sSet('ledger:categories', JSON.stringify(categories)); }
async function saveEntries(){ await sSet('ledger:entries', JSON.stringify(entries)); }

/* ============================================================
   RENDER  ·  home
   ============================================================ */
function renderAll(){ renderMonth(); renderSummary(); renderList(); }

function renderMonth(){
  el('monthLabel').textContent = viewMonth.getFullYear()+'. '+String(viewMonth.getMonth()+1).padStart(2,'0');
}

function monthEntries(){
  const mk = monthKey(viewMonth);
  return entries.filter(e => e.date && e.date.slice(0,7)===mk);
}
function catById(id){ return categories.find(c=>c.id===id); }

function renderSummary(){
  const list = monthEntries();
  const expenseList = list.filter(e=>(e.type||'expense')!=='income');
  const incomeList = list.filter(e=>e.type==='income');
  const total = expenseList.reduce((s,e)=>s+e.amount,0);
  const incomeTotal = incomeList.reduce((s,e)=>s+e.amount,0);
  const pendingList = list.filter(e=>e.status==='pending');
  const pendingTotal = pendingList.reduce((s,e)=>s+e.amount,0);
  const byCat = {};
  expenseList.forEach(e=>{ byCat[e.categoryId]=(byCat[e.categoryId]||0)+e.amount; });
  const rows = Object.entries(byCat)
    .map(([cid,amt])=>{ const c=catById(cid); return { name:c?c.name:'(삭제됨)', color:c?c.color:'#9B948A', amt }; })
    .sort((a,b)=>b.amt-a.amt);
  const max = rows.length?rows[0].amt:1;

  let html = `<div class="summary">
    <div class="cap">이번 달 지출</div>
    <div class="total num"><span class="won">₩</span>${fmt(total)}<span class="count">${expenseList.length}건</span></div>`;
  if(incomeList.length || pendingList.length){
    html += `<div style="display:flex;gap:14px;margin:-8px 0 14px;flex-wrap:wrap">`;
    if(incomeList.length) html += `<div style="font-size:12.5px;font-weight:700;color:var(--accent)">입금 ₩${fmt(incomeTotal)} · ${incomeList.length}건</div>`;
    if(pendingList.length) html += `<div style="font-size:12.5px;font-weight:700;color:#C77D3A">⏳ 결제예정 ₩${fmt(pendingTotal)} · ${pendingList.length}건</div>`;
    html += `</div>`;
  }
  if(rows.length){
    html += `<div class="breakdown">` + rows.map(r=>`
      <div class="bd-row">
        <div class="bd-name"><span class="bd-dot" style="background:${r.color}"></span>${esc(r.name)}</div>
        <div class="bd-bar"><i style="width:${Math.max(6,(r.amt/max)*100)}%;background:${r.color}"></i></div>
        <div class="bd-amt num">${fmt(r.amt)}</div>
      </div>`).join('') + `</div>`;
  }
  html += `</div>`;
  el('summary').innerHTML = html;
}

function renderList(){
  const list = monthEntries().slice().sort((a,b)=>{
    if(a.date!==b.date) return a.date<b.date?1:-1;
    return (b.createdAt||0)-(a.createdAt||0);
  });
  const wrap = el('list');
  if(!list.length){
    wrap.innerHTML = `<div class="empty">
      <div class="big">🧾</div>
      <div class="t">아직 기록이 없어요</div>
      <div class="s">아래 <b>지출 추가</b>를 눌러<br>이번 달 첫 지출을 적어보세요</div>
    </div>`;
    return;
  }
  // group by date
  const groups={};
  list.forEach(e=>{ (groups[e.date]=groups[e.date]||[]).push(e); });
  const dates = Object.keys(groups).sort().reverse();
  let html='';
  dates.forEach(dt=>{
    const items=groups[dt];
    const dsum=items.reduce((s,e)=>s+e.amount,0);
    const p=prettyDate(dt);
    html+=`<div class="day-group">
      <div class="day-head">
        <div><span class="d">${p.day}</span><span class="dow">${p.dow}</span></div>
        <div class="dsum num">₩${fmt(dsum)}</div>
      </div>`;
    items.forEach(e=>{
      const c=catById(e.categoryId);
      const color=c?c.color:'#9B948A';
      const letter=(e.categoryName||'?').slice(0,1);
      const isIncome=e.type==='income';
      const isPending=e.status==='pending';
      const sub=e.subitemName?`<span class="e-sub">${esc(e.subitemName)}</span>`:'';
      const memo=e.memo?`<span>${esc(e.memo)}</span>`:'';
      const clip=e.hasPhoto?`<span class="e-clip"><svg viewBox="0 0 24 24"><path d="M21 12.5l-8 8a5 5 0 01-7-7l8-8a3.3 3.3 0 014.7 4.7l-8 8a1.6 1.6 0 01-2.3-2.3l7-7"/></svg>영수증</span>`:'';
      const methodTag=e.method==='other'?`<span class="e-tag method">기타</span>`:'';
      const statusTag=isPending
        ? `<span class="e-tag pending" data-toggle-status="${e.id}"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>결제예정</span>`
        : `<span class="e-tag done" data-toggle-status="${e.id}"><svg viewBox="0 0 24 24"><path d="M4 12l5 5L20 6"/></svg>결제완료</span>`;
      const meta=[sub,methodTag,statusTag,memo,clip].filter(Boolean).join('<span style="color:var(--line-strong)">·</span>');
      html+=`<div class="entry ${isPending?'pending':'done'}" data-id="${e.id}">
        <div class="e-dot" style="background:${color}">${esc(letter)}</div>
        <div class="e-mid">
          <div class="e-cat">${esc(e.categoryName||'')}${isIncome?`<span class="e-tag income" style="margin-left:6px">입금</span>`:''}</div>
          <div class="e-meta">${meta||'<span style="color:var(--muted)">메모 없음</span>'}</div>
        </div>
        <div class="e-amt num ${isIncome?'income':''} ${isPending?'pending':''}">${isIncome?'+':''}${fmt(e.amount)}</div>
      </div>`;
    });
    html+=`</div>`;
  });
  wrap.innerHTML=html;
  wrap.querySelectorAll('.entry').forEach(node=>{
    node.addEventListener('click',()=>openEntry(node.dataset.id));
  });
  wrap.querySelectorAll('[data-toggle-status]').forEach(tag=>{
    tag.addEventListener('click',(ev)=>{ ev.stopPropagation(); toggleStatus(tag.dataset.toggleStatus); });
  });
}

async function toggleStatus(id){
  const e=entries.find(x=>x.id===id); if(!e) return;
  e.status = e.status==='pending' ? 'done' : 'pending';
  await saveEntries();
  syncEntry(e);
  renderAll();
  toast(e.status==='pending'?'결제예정으로 바꿨어요':'결제완료로 바꿨어요');
}

function esc(s){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* ============================================================
   ENTRY SHEET  ·  add / edit
   ============================================================ */
function openSheet(scrim,sheet){ el(scrim).classList.add('show'); el(sheet).classList.add('show'); document.body.style.overflow='hidden'; }
function closeSheet(scrim,sheet){ el(scrim).classList.remove('show'); el(sheet).classList.remove('show'); document.body.style.overflow=''; }

function newEntry(){
  editingId=null; selCat=null; selSub=null; pendingPhotos=[]; photosDirty=false;
  selType='expense'; selMethod='cash'; selStatus='done';
  el('entryTitle').textContent='지출 추가';
  el('amount').value=''; el('memo').value='';
  el('date').value=ymd(new Date());
  el('deleteEntry').style.display='none';
  renderTypeChips(); renderMethodChips(); renderStatusChips();
  renderCatChips(); renderSubChips(); renderPhotos(); validate();
  openSheet('scrimEntry','sheetEntry');
  setTimeout(()=>el('amount').focus(),300);
}

async function openEntry(id){
  const e=entries.find(x=>x.id===id); if(!e) return;
  editingId=id; selCat=e.categoryId; selSub=e.subitemId||null;
  selType=e.type||'expense'; selMethod=e.method||'cash'; selStatus=e.status||'done';
  el('entryTitle').textContent='지출 수정';
  el('amount').value=fmt(e.amount);
  el('memo').value=e.memo||'';
  el('date').value=e.date;
  el('deleteEntry').style.display='block';
  pendingPhotos=[]; photosDirty=false;
  renderTypeChips(); renderMethodChips(); renderStatusChips();
  renderCatChips(); renderSubChips(); renderPhotos(); validate();
  openSheet('scrimEntry','sheetEntry');
  if(e.hasPhoto){
    const p=await sGet('ledger:photo:'+id);
    if(p){ try{ pendingPhotos=JSON.parse(p); renderPhotos(); }catch(_){}}
  }
}

const TYPE_OPTS = [ {id:'expense', name:'지출', color:'#C0492F'}, {id:'income', name:'입금', color:'#16695B'} ];
const METHOD_OPTS = [ {id:'cash', name:'현금'}, {id:'other', name:'기타(계좌·카드)'} ];
const STATUS_OPTS = [ {id:'done', name:'결제완료'}, {id:'pending', name:'결제예정'} ];

function renderTypeChips(){
  el('typeChips').innerHTML = TYPE_OPTS.map(o=>`
    <button class="chip ${selType===o.id?'on':''}" data-id="${o.id}" style="${selType===o.id?`background:${o.color}`:''}">${o.name}</button>`).join('');
  el('typeChips').querySelectorAll('.chip').forEach(b=>{
    b.onclick=()=>{ selType=b.dataset.id; renderTypeChips(); };
  });
}
function renderMethodChips(){
  el('methodChips').innerHTML = METHOD_OPTS.map(o=>`
    <button class="chip ${selMethod===o.id?'on':''}" data-id="${o.id}" style="${selMethod===o.id?`background:var(--ink)`:''}">${o.name}</button>`).join('');
  el('methodChips').querySelectorAll('.chip').forEach(b=>{
    b.onclick=()=>{ selMethod=b.dataset.id; renderMethodChips(); };
  });
}
function renderStatusChips(){
  el('statusChips').innerHTML = STATUS_OPTS.map(o=>`
    <button class="chip ${selStatus===o.id?'on':''}" data-id="${o.id}" style="${selStatus===o.id?`background:${o.id==='pending'?'#C77D3A':'var(--accent)'}`:''}">${o.name}</button>`).join('');
  el('statusChips').querySelectorAll('.chip').forEach(b=>{
    b.onclick=()=>{ selStatus=b.dataset.id; renderStatusChips(); };
  });
}

function renderCatChips(){
  el('catChips').innerHTML = categories.map(c=>`
    <button class="chip ${selCat===c.id?'on':''}" data-id="${c.id}" style="${selCat===c.id?`background:${c.color}`:''}">
      <span class="cdot" style="background:${selCat===c.id?'rgba(255,255,255,.85)':c.color}"></span>${esc(c.name)}
    </button>`).join('');
  el('catChips').querySelectorAll('.chip').forEach(b=>{
    b.onclick=()=>{ selCat=b.dataset.id; selSub=null; renderCatChips(); renderSubChips(); validate(); };
  });
}

function renderSubChips(){
  const field=el('subField');
  if(!selCat){ field.style.display='none'; return; }
  const c=catById(selCat); if(!c){ field.style.display='none'; return; }
  field.style.display='block';
  el('subLabel').textContent='세부항목 ('+c.name+')';
  let html = c.subitems.map(s=>`
    <button class="chip ${selSub===s.id?'on':''}" data-id="${s.id}" style="${selSub===s.id?`background:${c.color}`:''}">${esc(s.name)}</button>`).join('');
  html += `<button class="chip add" id="addSubInline"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>항목 추가</button>`;
  el('subChips').innerHTML=html;
  el('subHint').textContent = c.subitems.length ? '' : '아직 세부항목이 없어요. ‘항목 추가’로 만들 수 있어요.';
  el('subChips').querySelectorAll('.chip:not(.add)').forEach(b=>{
    b.onclick=()=>{ selSub = selSub===b.dataset.id ? null : b.dataset.id; renderSubChips(); };
  });
  el('addSubInline').onclick=async()=>{
    const name=prompt(c.name+' 세부항목 이름 (예: '+placeholderFor(c.name)+')');
    if(!name||!name.trim()) return;
    const s={id:uid(),name:name.trim()};
    c.subitems.push(s); await saveCategories(); syncCat(c);
    selSub=s.id; renderSubChips();
  };
}
function placeholderFor(catName){
  if(catName.includes('공임')) return '동대문공장';
  if(catName.includes('원단')) return 'OO텍스타일';
  if(catName.includes('화물')) return '경동택배';
  return '항목명';
}

/* photos */
function renderPhotos(){
  let html = pendingPhotos.map((src,i)=>`
    <div class="photo-thumb" data-i="${i}">
      <img src="${src}" alt="영수증 ${i+1}">
      <button class="rm" data-rm="${i}">×</button>
    </div>`).join('');
  html += `<button class="photo-add" id="photoAddBtn">
    <svg viewBox="0 0 24 24"><path d="M14.5 4h-5L8 6H4a1 1 0 00-1 1v11a1 1 0 001 1h16a1 1 0 001-1V7a1 1 0 00-1-1h-4l-1.5-2z"/><circle cx="12" cy="13" r="3.2"/></svg>
    <span>사진 추가</span></button>`;
  el('photoGrid').innerHTML=html;
  el('photoAddBtn').onclick=()=>el('photoInput').click();
  el('photoGrid').querySelectorAll('[data-rm]').forEach(b=>{
    b.onclick=(ev)=>{ ev.stopPropagation(); pendingPhotos.splice(+b.dataset.rm,1); photosDirty=true; renderPhotos(); };
  });
  el('photoGrid').querySelectorAll('.photo-thumb img').forEach((img,i)=>{
    img.onclick=()=>openViewer(pendingPhotos,i);
  });
}

function compressImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const max=1400;
        let {width:w,height:h}=img;
        if(w>max||h>max){ const r=Math.min(max/w,max/h); w=Math.round(w*r); h=Math.round(h*r); }
        const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        resolve(cv.toDataURL('image/jpeg',0.72));
      };
      img.onerror=reject; img.src=reader.result;
    };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}

el('photoInput')&&(el('photoInput').onchange=async(ev)=>{
  const files=[...ev.target.files];
  for(const f of files){
    try{ const b64=await compressImage(f); pendingPhotos.push(b64); photosDirty=true; }catch(_){}
  }
  ev.target.value='';
  renderPhotos();
});

/* amount formatting */
el('amount').addEventListener('input',e=>{
  const digits=e.target.value.replace(/[^0-9]/g,'').slice(0,12);
  e.target.value = digits ? Number(digits).toLocaleString('ko-KR') : '';
  validate();
});
function amountValue(){ return Number(el('amount').value.replace(/[^0-9]/g,''))||0; }
function validate(){ el('saveEntry').disabled = !(amountValue()>0 && selCat); }

async function saveEntryNow(){
  const amount=amountValue(); if(!(amount>0)||!selCat) return;
  const c=catById(selCat);
  const sub=c&&selSub?c.subitems.find(s=>s.id===selSub):null;
  const id=editingId||uid();
  const rec={
    id, date:el('date').value||ymd(new Date()), amount,
    type:selType, method:selMethod, status:selStatus,
    categoryId:selCat, categoryName:c?c.name:'',
    subitemId:sub?sub.id:null, subitemName:sub?sub.name:'',
    memo:el('memo').value.trim(),
    hasPhoto:pendingPhotos.length>0,
    createdAt: editingId ? (entries.find(x=>x.id===id)?.createdAt||Date.now()) : Date.now()
  };
  if(editingId){ const i=entries.findIndex(x=>x.id===id); entries[i]=rec; }
  else entries.push(rec);
  await saveEntries();
  syncEntry(rec);

  if(photosDirty || !editingId){
    if(pendingPhotos.length){
      await sSet('ledger:photo:'+id, JSON.stringify(pendingPhotos));
      if(cloudConnected) phRef.child(id).set(pendingPhotos).catch(err=>{ console.warn('사진 동기화 실패', err); toast('⚠️ 사진 동기화 실패 — 이 기기에만 저장됐어요'); });
    }else{
      await sDel('ledger:photo:'+id);
      if(cloudConnected) phRef.child(id).remove().catch(err=>console.warn(err));
    }
  }
  closeSheet('scrimEntry','sheetEntry');
  renderAll();
  toast(editingId?'수정했어요':'저장했어요');
}

async function deleteEntryNow(){
  if(!editingId) return;
  if(!confirm('이 지출 기록을 삭제할까요?')) return;
  await sDel('ledger:photo:'+editingId);
  entries=entries.filter(x=>x.id!==editingId);
  await saveEntries();
  if(cloudConnected){
    entRef.child(editingId).remove().catch(err=>console.warn(err));
    phRef.child(editingId).remove().catch(err=>console.warn(err));
  }
  closeSheet('scrimEntry','sheetEntry');
  renderAll();
  toast('삭제했어요');
}

/* ============================================================
   CATEGORY MANAGER
   ============================================================ */
function openCats(){ renderCatManager(); openSheet('scrimCat','sheetCat'); }

function renderCatManager(){
  let html = categories.map(c=>`
    <div class="cat-card" data-id="${c.id}">
      <div class="cat-card-head">
        <span class="cdot" style="background:${c.color}"></span>
        <span class="cname">${esc(c.name)}</span>
        <button class="mini" data-edit="${c.id}" title="이름·색상 수정"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg></button>
      </div>
      <div class="sub-list">${
        c.subitems.length
          ? c.subitems.map(s=>`<span class="sub-tag">${esc(s.name)}<button class="del" data-delsub="${c.id}:${s.id}">×</button></span>`).join('')
          : ''
      }</div>
      ${c.subitems.length?'':'<div class="no-sub">세부항목을 추가하면 입력할 때 빠르게 고를 수 있어요.</div>'}
      <div class="sub-add-row">
        <input placeholder="세부항목 추가 (예: ${esc(placeholderFor(c.name))})" data-subinput="${c.id}">
        <button data-addsub="${c.id}">추가</button>
      </div>
    </div>`).join('');
  html += `<button class="add-cat-btn" id="addCatBtn"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>카테고리 추가</button>
    <div style="height:8px"></div>`;
  el('catBody').innerHTML=html;

  el('addCatBtn').onclick=()=>openCatEdit(null);
  el('catBody').querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=>openCatEdit(b.dataset.edit));
  el('catBody').querySelectorAll('[data-addsub]').forEach(b=>{
    b.onclick=async()=>{
      const inp=el('catBody').querySelector(`[data-subinput="${b.dataset.addsub}"]`);
      const name=inp.value.trim(); if(!name) return;
      const c=catById(b.dataset.addsub);
      c.subitems.push({id:uid(),name}); await saveCategories(); syncCat(c);
      renderCatManager();
    };
  });
  el('catBody').querySelectorAll('[data-subinput]').forEach(inp=>{
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ const c=catById(inp.dataset.subinput); const n=inp.value.trim(); if(n){ c.subitems.push({id:uid(),name:n}); saveCategories().then(renderCatManager); syncCat(c); } } });
  });
  el('catBody').querySelectorAll('[data-delsub]').forEach(b=>{
    b.onclick=async()=>{
      const [cid,sid]=b.dataset.delsub.split(':');
      const c=catById(cid); c.subitems=c.subitems.filter(s=>s.id!==sid);
      await saveCategories(); syncCat(c); renderCatManager();
    };
  });
}

/* category add / edit */
function openCatEdit(id){
  editingCatId=id;
  const swWrap=el('swatches');
  if(id){
    const c=catById(id);
    el('catEditTitle').textContent='카테고리 수정';
    el('catName').value=c.name; catEditColor=c.color;
    el('catEditDelete').style.display='block';
  }else{
    el('catEditTitle').textContent='카테고리 추가';
    el('catName').value=''; catEditColor=PALETTE[0];
    el('catEditDelete').style.display='none';
  }
  swWrap.innerHTML=PALETTE.map(col=>`<button class="sw ${col===catEditColor?'on':''}" data-col="${col}" style="background:${col}"></button>`).join('');
  swWrap.querySelectorAll('.sw').forEach(s=> s.onclick=()=>{ catEditColor=s.dataset.col; swWrap.querySelectorAll('.sw').forEach(x=>x.classList.toggle('on',x.dataset.col===catEditColor)); });
  openSheet('scrimCatEdit','sheetCatEdit');
  setTimeout(()=>el('catName').focus(),300);
}

async function saveCatEdit(){
  const name=el('catName').value.trim();
  if(!name){ toast('이름을 입력해 주세요'); return; }
  let cat;
  if(editingCatId){
    const c=catById(editingCatId);
    const oldName=c.name;
    c.name=name; c.color=catEditColor;
    cat=c;
    // 과거 기록의 표시 이름도 함께 갱신
    if(oldName!==name){
      entries.forEach(e=>{ if(e.categoryId===editingCatId) e.categoryName=name; });
      await saveEntries();
      entries.filter(e=>e.categoryId===editingCatId).forEach(syncEntry);
    }
  }else{
    cat={id:uid(),name,color:catEditColor,subitems:[]};
    categories.push(cat);
  }
  await saveCategories();
  syncCat(cat);
  closeSheet('scrimCatEdit','sheetCatEdit');
  renderCatManager(); renderAll();
  toast('저장했어요');
}

async function deleteCatNow(){
  if(!editingCatId) return;
  const used=entries.filter(e=>e.categoryId===editingCatId).length;
  const msg=used
    ? `이 카테고리로 기록한 지출이 ${used}건 있어요.\n카테고리를 삭제해도 기존 기록은 그대로 남습니다. 삭제할까요?`
    : '이 카테고리를 삭제할까요?';
  if(!confirm(msg)) return;
  const delId=editingCatId;
  categories=categories.filter(c=>c.id!==delId);
  await saveCategories();
  if(cloudConnected) catRef.child(delId).remove().catch(err=>console.warn(err));
  closeSheet('scrimCatEdit','sheetCatEdit');
  renderCatManager(); renderAll();
  toast('삭제했어요');
}

/* ============================================================
   PHOTO VIEWER
   ============================================================ */
let viewerList=[], viewerIdx=0;
function openViewer(list,idx){
  viewerList=list; viewerIdx=idx;
  el('viewerImg').src=list[idx];
  el('viewerNav').innerHTML=list.map((_,i)=>`<span class="vdot ${i===idx?'on':''}"></span>`).join('');
  el('viewer').classList.add('show');
}
el('viewerClose').onclick=()=>el('viewer').classList.remove('show');
el('viewer').onclick=(e)=>{ if(e.target.id==='viewer') el('viewer').classList.remove('show'); };

/* ============================================================
   EXPORT  ·  CSV / backup / restore
   ============================================================ */
function download(filename,text,type){
  const blob=new Blob([text],{type:type||'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },500);
}

function exportCsv(){
  const rows=entries.slice().sort((a,b)=> a.date<b.date?1:a.date>b.date?-1:0);
  const head=['날짜','구분','결제수단','결제상태','카테고리','세부항목','금액','메모','영수증'];
  const body=rows.map(e=>[
    e.date,
    e.type==='income'?'입금':'지출',
    e.method==='other'?'기타':'현금',
    e.status==='pending'?'결제예정':'결제완료',
    e.categoryName||'', e.subitemName||'', e.amount, (e.memo||'').replace(/\n/g,' '), e.hasPhoto?'있음':''
  ].map(csvCell).join(','));
  const total=rows.filter(e=>(e.type||'expense')!=='income').reduce((s,e)=>s+e.amount,0);
  body.push(['','','','','','합계',total,'',''].map(csvCell).join(','));
  const csv='\uFEFF'+[head.map(csvCell).join(','),...body].join('\r\n');
  download(`지출장부_${monthKey(new Date())}.csv`, csv, 'text/csv;charset=utf-8');
  closeMenu(); toast('CSV로 내보냈어요');
}
function csvCell(v){ const s=String(v); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }

async function backup(){
  toast('백업 준비 중…');
  const photos={};
  for(const e of entries){ if(e.hasPhoto){ const p=await sGet('ledger:photo:'+e.id); if(p) photos[e.id]=p; } }
  const data={ app:'jejeunosity-cash-ledger', version:1, exportedAt:new Date().toISOString(), categories, entries, photos };
  download(`지출장부_백업_${ymd(new Date())}.json`, JSON.stringify(data), 'application/json');
  closeMenu(); toast('백업 파일을 내려받았어요');
}

el('restoreInput').onchange=async(ev)=>{
  const file=ev.target.files[0]; ev.target.value=''; if(!file) return;
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    if(!data.entries||!data.categories) throw new Error('형식 오류');
    const confirmMsg = cloudConnected
      ? '백업을 불러오면 현재 데이터를 덮어씁니다 (연결된 다른 기기에도 반영돼요). 계속할까요?'
      : '백업을 불러오면 현재 데이터를 덮어씁니다. 계속할까요?';
    if(!confirm(confirmMsg)) return;
    categories=data.categories; entries=data.entries;
    await saveCategories(); await saveEntries();
    if(data.photos){ for(const [id,p] of Object.entries(data.photos)){ await sSet('ledger:photo:'+id, typeof p==='string'?p:JSON.stringify(p)); } }
    if(cloudConnected){
      const catObj={}; categories.forEach(c=>catObj[c.id]=c);
      const entObj={}; entries.forEach(e=>entObj[e.id]=e);
      await catRef.set(catObj);
      await entRef.set(entObj);
      if(data.photos){
        const photoUpdates={};
        for(const [id,p] of Object.entries(data.photos)){ photoUpdates[id]= typeof p==='string' ? JSON.parse(p) : p; }
        await phRef.set(photoUpdates);
      }
    }
    renderAll(); toast('복원했어요');
  }catch(e){ alert('불러오기에 실패했어요. 올바른 백업 파일인지 확인해 주세요.'); }
};

/* ============================================================
   MENU + bindings
   ============================================================ */
function toast(msg){ const t=el('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1900); }
function closeMenu(){ el('menu').classList.remove('show'); }

function bind(){
  el('fab').onclick=newEntry;
  el('closeEntry').onclick=()=>closeSheet('scrimEntry','sheetEntry');
  el('scrimEntry').onclick=()=>closeSheet('scrimEntry','sheetEntry');
  el('saveEntry').onclick=saveEntryNow;
  el('deleteEntry').onclick=deleteEntryNow;

  el('btnCats').onclick=openCats;
  el('closeCat').onclick=()=>closeSheet('scrimCat','sheetCat');
  el('scrimCat').onclick=()=>closeSheet('scrimCat','sheetCat');

  el('closeCatEdit').onclick=()=>closeSheet('scrimCatEdit','sheetCatEdit');
  el('scrimCatEdit').onclick=()=>closeSheet('scrimCatEdit','sheetCatEdit');
  el('catEditSave').onclick=saveCatEdit;
  el('catEditDelete').onclick=deleteCatNow;

  el('prevM').onclick=()=>{ viewMonth.setMonth(viewMonth.getMonth()-1); renderAll(); };
  el('nextM').onclick=()=>{ viewMonth.setMonth(viewMonth.getMonth()+1); renderAll(); };

  el('btnMenu').onclick=(e)=>{ e.stopPropagation(); el('menu').classList.toggle('show'); };
  document.addEventListener('click',(e)=>{ if(!el('menu').contains(e.target) && e.target!==el('btnMenu')) closeMenu(); });
  el('mExportCsv').onclick=exportCsv;
  el('mBackup').onclick=backup;
  el('mRestore').onclick=()=>{ closeMenu(); el('restoreInput').click(); };
}

init();
