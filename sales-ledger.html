<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>매출장부</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
// gstatic이 막히거나 느려서 안 불러와졌으면 jsdelivr에서 동기적으로 재시도
if (typeof firebase === 'undefined' || !firebase.database) {
  document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/firebase@9.22.2/firebase-app-compat.js"><\/scr'+'ipt>');
  document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/firebase@9.22.2/firebase-database-compat.js"><\/scr'+'ipt>');
}
</script>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

  :root{
    --bg:#FBFAF6;
    --surface:#FFFFFF;
    --ink:#211E1A;
    --ink-soft:#6B655C;
    --muted:#9B948A;
    --line:#ECE7DD;
    --line-strong:#DED7C9;
    --accent:#B0473A;
    --accent-soft:#F5E6E3;
    --danger:#C0492F;
    --danger-soft:#F6E6E1;
    --shadow:0 1px 2px rgba(33,30,26,.04),0 8px 24px rgba(33,30,26,.06);
    --radius:16px;
    --radius-sm:11px;
    --num:'Pretendard Variable',Pretendard,-apple-system,system-ui,sans-serif;
    --font:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;font-feature-settings:"tnum"}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:16px}

  .app{max-width:560px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:96px}

  /* ---------- HEADER ---------- */
  .top{position:sticky;top:0;z-index:20;background:rgba(251,250,246,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .top-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px}
  .brand{display:flex;flex-direction:column;gap:1px}
  .brand h1{margin:0;font-size:19px;font-weight:800;letter-spacing:-.02em}
  .brand .sub{font-size:11.5px;color:var(--muted);font-weight:600;letter-spacing:.04em}
  .top-actions{display:flex;gap:6px}
  .icon-btn{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);transition:background .15s}
  .icon-btn:hover{background:var(--line)}
  .icon-btn svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}

  /* ---------- MONTH + SUMMARY ---------- */
  .month-nav{display:flex;align-items:center;justify-content:center;gap:18px;padding:8px 0 2px}
  .month-nav button{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink-soft)}
  .month-nav button:hover{background:var(--line)}
  .month-nav .label{font-size:15px;font-weight:700;min-width:96px;text-align:center;letter-spacing:.01em}
  .month-nav svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}

  .summary{margin:8px 16px 4px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 20px 16px;overflow:hidden}
  .summary .cap{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.06em}
  .summary .total{font-size:34px;font-weight:800;letter-spacing:-.03em;margin:2px 0 14px;display:flex;align-items:baseline;gap:4px}
  .summary .total .won{font-size:20px;font-weight:700;color:var(--ink-soft)}
  .summary .total .count{margin-left:auto;font-size:12.5px;font-weight:600;color:var(--muted);align-self:flex-end;padding-bottom:5px}

  .breakdown{display:flex;flex-direction:column;gap:11px}
  .bd-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center}
  .bd-name{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;white-space:nowrap}
  .bd-dot{width:9px;height:9px;border-radius:3px;flex:none}
  .bd-bar{height:7px;border-radius:99px;background:var(--line);overflow:hidden}
  .bd-bar > i{display:block;height:100%;border-radius:99px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .bd-amt{font-size:12.5px;font-weight:700;color:var(--ink-soft);white-space:nowrap}

  .method-strip{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
  .method-pill{font-size:12px;font-weight:700;color:var(--ink-soft);background:var(--bg);border:1px solid var(--line);border-radius:99px;padding:6px 12px}
  .method-pill b{color:var(--ink);font-weight:800;margin-left:3px}

  /* ---------- LIST ---------- */
  .day-group{margin:18px 16px 0}
  .day-head{display:flex;align-items:baseline;justify-content:space-between;padding:0 4px 8px;border-bottom:1px solid var(--line)}
  .day-head .d{font-size:13.5px;font-weight:700}
  .day-head .dow{font-size:11.5px;color:var(--muted);font-weight:600;margin-left:6px}
  .day-head .dsum{font-size:12.5px;font-weight:700;color:var(--ink-soft)}

  .entry{display:flex;align-items:center;gap:13px;padding:13px 4px 13px 11px;border-bottom:1px solid var(--line);transition:background .12s;cursor:pointer}
  .entry:active{background:var(--line)}
  .entry:last-child{border-bottom:none}
  .e-dot{width:40px;height:40px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff}
  .e-mid{flex:1;min-width:0}
  .e-cat{font-size:14.5px;font-weight:700;letter-spacing:-.01em}
  .e-meta{font-size:12px;color:var(--muted);font-weight:500;margin-top:1px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .e-sub{color:var(--ink-soft);font-weight:600}
  .e-amt{font-size:16px;font-weight:800;letter-spacing:-.02em;white-space:nowrap;color:var(--accent)}

  .empty{text-align:center;padding:64px 30px;color:var(--muted)}
  .empty .big{font-size:40px;margin-bottom:12px}
  .empty .t{font-size:15px;font-weight:700;color:var(--ink-soft)}
  .empty .s{font-size:13px;margin-top:5px;line-height:1.6}

  /* ---------- FAB ---------- */
  .fab{position:fixed;left:50%;transform:translateX(-50%);bottom:24px;z-index:30;
    background:var(--accent);color:#fff;border-radius:99px;height:54px;padding:0 26px 0 22px;
    display:flex;align-items:center;gap:9px;font-size:15.5px;font-weight:700;letter-spacing:-.01em;
    box-shadow:0 6px 20px rgba(176,71,58,.34),0 2px 6px rgba(176,71,58,.2);transition:transform .15s,box-shadow .15s}
  .fab:active{transform:translateX(-50%) scale(.96)}
  .fab svg{width:22px;height:22px;stroke:currentColor;stroke-width:2.4;fill:none;stroke-linecap:round}

  /* ---------- SHEET / MODAL ---------- */
  .scrim{position:fixed;inset:0;background:rgba(33,30,26,.42);z-index:40;opacity:0;pointer-events:none;transition:opacity .25s}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;max-width:560px;margin:0 auto;
    background:var(--bg);border-radius:22px 22px 0 0;box-shadow:0 -8px 40px rgba(33,30,26,.18);
    transform:translateY(100%);transition:transform .32s cubic-bezier(.2,.85,.2,1);
    max-height:94vh;display:flex;flex-direction:column}
  .sheet.show{transform:translateY(0)}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;flex:none}
  .sheet-head h2{margin:0;font-size:17px;font-weight:800;letter-spacing:-.02em}
  .sheet-head .x{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft)}
  .sheet-head .x:hover{background:var(--line)}
  .sheet-head .x svg{width:21px;height:21px;stroke:currentColor;stroke-width:2.1;fill:none;stroke-linecap:round}
  .sheet-body{overflow-y:auto;padding:4px 18px 20px;-webkit-overflow-scrolling:touch}
  .sheet-foot{flex:none;padding:12px 18px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:var(--bg);display:flex;gap:10px}

  /* ---------- FORM ---------- */
  .field{margin-top:18px}
  .field > label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-soft);letter-spacing:.02em;margin-bottom:8px}
  .amount-wrap{display:flex;align-items:center;background:var(--surface);border:1.5px solid var(--line-strong);border-radius:14px;padding:0 16px;transition:border-color .15s}
  .amount-wrap:focus-within{border-color:var(--accent)}
  .amount-wrap .pre{font-size:26px;font-weight:700;color:var(--muted)}
  .amount-wrap input{flex:1;border:none;outline:none;background:none;font-size:30px;font-weight:800;letter-spacing:-.02em;padding:14px 6px;text-align:right;color:var(--ink)}
  .amount-wrap .won{font-size:18px;font-weight:700;color:var(--ink-soft)}

  .inp{width:100%;background:var(--surface);border:1.5px solid var(--line-strong);border-radius:12px;padding:13px 14px;outline:none;color:var(--ink);transition:border-color .15s}
  .inp:focus{border-color:var(--accent)}
  textarea.inp{resize:none;min-height:64px;line-height:1.5}
  input[type=date].inp{appearance:none;-webkit-appearance:none}

  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:inline-flex;align-items:center;gap:7px;padding:11px 16px;border-radius:12px;background:var(--surface);border:1.5px solid var(--line-strong);font-size:14px;font-weight:700;color:var(--ink-soft);transition:all .14s}
  .chip .cdot{width:9px;height:9px;border-radius:3px;flex:none}
  .chip.on{border-color:transparent;color:#fff;font-weight:800}

  .subhint{font-size:12px;color:var(--muted);margin-top:9px;font-weight:500}

  /* ---------- BUTTONS ---------- */
  .btn{flex:1;border-radius:13px;padding:15px;font-size:15.5px;font-weight:700;letter-spacing:-.01em;text-align:center;transition:transform .12s,opacity .12s}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(176,71,58,.24)}
  .btn-primary:disabled{opacity:.4;box-shadow:none}
  .btn-ghost{background:var(--surface);border:1.5px solid var(--line-strong);color:var(--ink-soft);flex:0 0 auto;padding:15px 20px}
  .btn-danger-ghost{background:var(--danger-soft);color:var(--danger);flex:0 0 auto;padding:15px 18px}

  /* ---------- SETTINGS / MANAGER ---------- */
  .settings-tabs{display:flex;gap:8px;margin-bottom:4px}
  .stab{flex:1;text-align:center;padding:11px;border-radius:11px;font-size:13.5px;font-weight:700;color:var(--muted);background:var(--surface);border:1.5px solid var(--line)}
  .stab.on{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
  .mgr-panel{display:none}
  .mgr-panel.on{display:block}
  .cat-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:13px 14px;margin-top:10px;display:flex;align-items:center;gap:11px}
  .cat-card .cdot{width:13px;height:13px;border-radius:4px;flex:none}
  .cat-card .cname{font-size:14.5px;font-weight:700;flex:1;letter-spacing:-.01em}
  .cat-card .mini{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
  .cat-card .mini:hover{background:var(--line);color:var(--ink-soft)}
  .cat-card .mini svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

  .add-cat-btn{width:100%;margin-top:14px;border:1.5px dashed var(--line-strong);border-radius:14px;padding:15px;color:var(--ink-soft);font-weight:700;font-size:14.5px;background:var(--surface);display:flex;align-items:center;justify-content:center;gap:8px}
  .add-cat-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.3;fill:none;stroke-linecap:round}

  .swatches{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
  .sw{width:34px;height:34px;border-radius:10px;position:relative;transition:transform .12s}
  .sw:active{transform:scale(.9)}
  .sw.on::after{content:'';position:absolute;inset:-4px;border-radius:13px;border:2.5px solid var(--ink)}

  /* menu popover */
  .menu{position:absolute;top:54px;right:16px;z-index:35;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:6px;min-width:188px;display:none}
  .menu.show{display:block}
  .menu button{display:flex;align-items:center;gap:11px;width:100%;padding:11px 12px;border-radius:9px;font-size:14px;font-weight:600;color:var(--ink);text-align:left}
  .menu button:hover{background:var(--line)}
  .menu button svg{width:17px;height:17px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round;color:var(--ink-soft)}
  .menu .sep{height:1px;background:var(--line);margin:5px 8px}

  /* toast */
  .toast{position:fixed;left:50%;bottom:92px;transform:translate(-50%,16px);z-index:90;
    background:var(--ink);color:#fff;padding:12px 20px;border-radius:99px;font-size:14px;font-weight:600;
    box-shadow:0 8px 24px rgba(0,0,0,.22);opacity:0;pointer-events:none;transition:all .26s;white-space:nowrap}
  .toast.show{opacity:1;transform:translate(-50%,0)}

  .danger-text{color:var(--danger)}
  .hidden-input{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="top-inner">
      <div class="brand">
        <h1>매출장부</h1>
        <span class="sub">SALES LEDGER · JEJEUNOSITY</span>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="btnSettings" title="분류/결제수단 관리" aria-label="설정">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.9l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.9-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.6 1.7 1.7 0 00-1.9.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.9 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.9l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.9.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.9-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.9V9a1.7 1.7 0 001.5 1h.1a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></svg>
        </button>
        <button class="icon-btn" id="btnMenu" title="더보기" aria-label="더보기">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg>
        </button>
      </div>
    </div>
    <div class="month-nav">
      <button id="prevM" aria-label="이전 달"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg></button>
      <div class="label num" id="monthLabel">—</div>
      <button id="nextM" aria-label="다음 달"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>
  </div>

  <div class="menu" id="menu">
    <button id="mExportCsv"><svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>엑셀(CSV) 내보내기</button>
    <button id="mBackup"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-3-6.7"/><path d="M21 3v5h-5"/></svg>전체 백업 (JSON)</button>
    <button id="mRestore"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 113 6.7"/><path d="M3 21v-5h5"/></svg>백업 불러오기</button>
  </div>

  <div id="summary"></div>
  <div id="list"></div>
</div>

<button class="fab" id="fab">
  <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
  매출 추가
</button>

<!-- ENTRY SHEET -->
<div class="scrim" id="scrimEntry"></div>
<div class="sheet" id="sheetEntry">
  <div class="sheet-head">
    <h2 id="entryTitle">매출 추가</h2>
    <button class="x" id="closeEntry" aria-label="닫기"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
  </div>
  <div class="sheet-body">
    <div class="field">
      <label>판매상품 분류</label>
      <div class="chips" id="catChips"></div>
    </div>

    <div class="field">
      <label>결제수단</label>
      <div class="chips" id="methodChips"></div>
    </div>

    <div class="field">
      <label>결제금액</label>
      <div class="amount-wrap">
        <span class="pre">₩</span>
        <input id="amount" class="num" inputmode="numeric" placeholder="0" autocomplete="off">
      </div>
    </div>

    <div class="field">
      <label>날짜</label>
      <input type="date" id="date" class="inp">
    </div>

    <div class="field">
      <label>메모 <span style="color:var(--muted);font-weight:500">(선택)</span></label>
      <textarea id="memo" class="inp" placeholder="내용을 적어두면 나중에 찾기 쉬워요"></textarea>
    </div>
  </div>
  <div class="sheet-foot">
    <button class="btn btn-danger-ghost" id="deleteEntry" style="display:none">삭제</button>
    <button class="btn btn-primary" id="saveEntry" disabled>저장</button>
  </div>
</div>

<!-- SETTINGS SHEET (분류 + 결제수단 관리) -->
<div class="scrim" id="scrimSettings"></div>
<div class="sheet" id="sheetSettings">
  <div class="sheet-head">
    <h2>분류 · 결제수단 관리</h2>
    <button class="x" id="closeSettings" aria-label="닫기"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
  </div>
  <div class="sheet-body">
    <div class="settings-tabs">
      <button class="stab on" id="tabCat" data-tab="cat">판매상품 분류</button>
      <button class="stab" id="tabMethod" data-tab="method">결제수단</button>
    </div>
    <div class="mgr-panel on" id="panelCat"></div>
    <div class="mgr-panel" id="panelMethod"></div>
  </div>
</div>

<!-- ITEM EDIT SHEET (분류/결제수단 공용) -->
<div class="scrim" id="scrimItemEdit"></div>
<div class="sheet" id="sheetItemEdit">
  <div class="sheet-head">
    <h2 id="itemEditTitle">분류 추가</h2>
    <button class="x" id="closeItemEdit" aria-label="닫기"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
  </div>
  <div class="sheet-body">
    <div class="field">
      <label>이름</label>
      <input id="itemName" class="inp" placeholder="예: 시즌상품" autocomplete="off">
    </div>
    <div class="field">
      <label>색상</label>
      <div class="swatches" id="itemSwatches"></div>
    </div>
  </div>
  <div class="sheet-foot">
    <button class="btn btn-danger-ghost" id="itemEditDelete" style="display:none">삭제</button>
    <button class="btn btn-primary" id="itemEditSave">저장</button>
  </div>
</div>

<input type="file" id="restoreInput" class="hidden-input" accept="application/json,.json">
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   매출장부  ·  sales ledger  (지출장부와 짝을 이루는 앱)
   저장: IndexedDB (브라우저 안에 영구 저장 · 서버 불필요)
        + Firebase 실시간 동기화 (여러 기기/매장 간 공유)
        → GitHub Pages / 로컬 파일 모두에서 동작
   키 구조
   - sales:categories   판매상품 분류 목록
   - sales:methods      결제수단 목록
   - sales:entries      매출 기록
   ============================================================ */

function showOfflineBanner(msg){
  let b = document.getElementById('offlineBanner');
  if(!b){

    b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:200;background:#C0492F;color:#fff;text-align:center;font-size:12px;font-weight:700;padding:7px 10px;';

function hideOfflineBanner(){ const b=document.getElementById('offlineBanner'); if(b) b.remove(); }
function objToArr(obj){ return obj ? Object.keys(obj).map(k=>obj[k]) : []; }
// Firebase는 값이 없거나 빈 배열/객체를 저장하면 지워버리는 특성이 있어서,
// 목록을 쓰기 전에 항상 배열 형태로 보정해서 렌더링 오류를 방지한다.
function normalizeItems(arr){ return (arr||[]).filter(Boolean).map(x=>({ id:x.id, name:x.name||'', color:x.color||PALETTE[0] })); }
function syncCat(c){ if(cloudConnected && c && catRef) catRef.child(c.id).set(c).catch(err=>{ console.warn('분류 동기화 실패', err); toast('⚠️ 동기화 실패 — 이 기기에만 저장됐어요'); }); }
function syncMethod(m){ if(cloudConnected && m && methodRef) methodRef.child(m.id).set(m).catch(err=>{ console.warn('결제수단 동기화 실패', err); toast('⚠️ 동기화 실패 — 이 기기에만 저장됐어요'); }); }
function syncEntry(e){ if(cloudConnected && e && entRef) entRef.child(e.id).set(e).catch(err=>{ console.warn('매출기록 동기화 실패', err); toast('⚠️ 동기화 실패 — 이 기기에만 저장됐어요'); }); }

/* ---------- storage : IndexedDB (key-value) ---------- */
const DB_NAME='jejeunosity-sales', DB_STORE='kv';
let _db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains(DB_STORE)) r.result.createObjectStore(DB_STORE); };
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
async function db(){ if(!_db) _db=await openDB(); return _db; }
async function sGet(k){
  try{ const d=await db();
    return await new Promise(res=>{ const q=d.transaction(DB_STORE,'readonly').objectStore(DB_STORE).get(k);
      q.onsuccess=()=>res(q.result==null?null:q.result); q.onerror=()=>res(null); });
  }catch(e){ return null; }
}
async function sSet(k,v){
  const d=await db();
  return new Promise((res,rej)=>{ const q=d.transaction(DB_STORE,'readwrite').objectStore(DB_STORE).put(v,k);
    q.onsuccess=()=>res(true); q.onerror=()=>rej(q.error); });
}
async function sDel(k){
  try{ const d=await db();
    return await new Promise(res=>{ const q=d.transaction(DB_STORE,'readwrite').objectStore(DB_STORE).delete(k);
      q.onsuccess=()=>res(true); q.onerror=()=>res(false); });
  }catch(e){}
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function el(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function catById(id){ return categories.find(c=>c.id===id); }
function methodById(id){ return methods.find(m=>m.id===id); }

/* ---------- formatting ---------- */
function fmt(n){ return (n||0).toLocaleString('ko-KR'); }
function ymd(d){ const z=x=>String(x).padStart(2,'0'); return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }
function monthKey(d){ const z=x=>String(x).padStart(2,'0'); return d.getFullYear()+'-'+z(d.getMonth()+1); }
const DOW=['일','월','화','수','목','금','토'];
function prettyDate(str){
  const d=new Date(str+'T00:00:00');
  return { day:(d.getMonth()+1)+'월 '+d.getDate()+'일', dow:DOW[d.getDay()] };
}

/* ============================================================
   INIT
   ============================================================ */
async function init(){
  const c = await sGet('sales:categories');
  if(c){ try{ categories = normalizeItems(JSON.parse(c)); }catch(e){ categories=[]; } }
  if(!categories || !categories.length){ categories = DEFAULT_CATEGORIES; await sSet('sales:categories', JSON.stringify(categories)); }

  const m = await sGet('sales:methods');
  if(m){ try{ methods = normalizeItems(JSON.parse(m)); }catch(e){ methods=[]; } }
  if(!methods || !methods.length){ methods = DEFAULT_METHODS; await sSet('sales:methods', JSON.stringify(methods)); }

  const e = await sGet('sales:entries');
  if(e){ try{ entries = JSON.parse(e); }catch(_){ entries=[]; } }

  renderAll();
  bind();
  if(cloudConnected) attachCloudSync();
  else showOfflineBanner('⚠️ 클라우드 연결 실패 — 이 기기는 다른 기기와 동기화되지 않아요');
}

function attachCloudSync(){
  catRef.on('value', snap=>{
    let arr = normalizeItems(objToArr(snap.val()));
    if(!arr.length){ arr = categories && categories.length ? categories : DEFAULT_CATEGORIES; arr.forEach(c=>catRef.child(c.id).set(c)); }
    categories = arr;
    saveCategories();
    renderCatChips(); if(el('panelCat')) renderMgrPanel('cat');
    renderAll();
    hideOfflineBanner();
  }, err=>{ console.warn('분류 동기화 오류', err); showOfflineBanner('⚠️ 동기화 연결이 끊겼어요 — 오프라인으로 계속 사용 가능해요'); });

  methodRef.on('value', snap=>{
    let arr = normalizeItems(objToArr(snap.val()));
    if(!arr.length){ arr = methods && methods.length ? methods : DEFAULT_METHODS; arr.forEach(m=>methodRef.child(m.id).set(m)); }
    methods = arr;
    saveMethods();
    renderMethodChips(); if(el('panelMethod')) renderMgrPanel('method');
    renderAll();
    hideOfflineBanner();
  }, err=>{ console.warn('결제수단 동기화 오류', err); showOfflineBanner('⚠️ 동기화 연결이 끊겼어요 — 오프라인으로 계속 사용 가능해요'); });

  entRef.on('value', snap=>{
    entries = objToArr(snap.val());
    saveEntries();
    renderAll();
    hideOfflineBanner();
  }, err=>{ console.warn('매출기록 동기화 오류', err); showOfflineBanner('⚠️ 동기화 연결이 끊겼어요 — 오프라인으로 계속 사용 가능해요'); });
}

async function saveCategories(){ await sSet('sales:categories', JSON.stringify(categories)); }
async function saveMethods(){ await sSet('sales:methods', JSON.stringify(methods)); }
async function saveEntries(){ await sSet('sales:entries', JSON.stringify(entries)); }

/* ============================================================
   RENDER  ·  home
   ============================================================ */
function renderAll(){ renderMonth(); renderSummary(); renderList(); }

function renderMonth(){
  el('monthLabel').textContent = viewMonth.getFullYear()+'. '+String(viewMonth.getMonth()+1).padStart(2,'0');
}

function entriesInMonth(){
  const mk = monthKey(viewMonth);
  return entries.filter(e=>e.date && e.date.slice(0,7)===mk);
}

function renderSummary(){
  const list = entriesInMonth();
  const total = list.reduce((s,e)=>s+(e.amount||0),0);

  const byCat = {};
  list.forEach(e=>{ byCat[e.categoryId] = (byCat[e.categoryId]||0) + (e.amount||0); });
  const maxCat = Math.max(1, ...Object.values(byCat));
  const catRows = categories
    .map(c=>({ c, amt: byCat[c.id]||0 }))
    .filter(r=>r.amt>0)
    .sort((a,b)=>b.amt-a.amt)
    .map(r=>`
      <div class="bd-row">
        <div class="bd-name"><span class="bd-dot" style="background:${r.c.color}"></span>${esc(r.c.name)}</div>
        <div class="bd-bar"><i style="width:${Math.round(r.amt/maxCat*100)}%;background:${r.c.color}"></i></div>
        <div class="bd-amt num">${fmt(r.amt)}</div>
      </div>`).join('');

  const byMethod = {};
  list.forEach(e=>{ byMethod[e.methodId] = (byMethod[e.methodId]||0) + (e.amount||0); });
  const methodPills = methods
    .filter(m=>byMethod[m.id]>0)
    .map(m=>`<span class="method-pill">${esc(m.name)}<b class="num">${fmt(byMethod[m.id])}</b></span>`).join('');

  el('summary').innerHTML = `
    <div class="summary">
      <div class="cap">이번 달 매출</div>
      <div class="total num">${fmt(total)}<span class="won">원</span><span class="count">${list.length}건</span></div>
      <div class="breakdown">${catRows || '<div style="font-size:12.5px;color:var(--muted)">이번 달 기록이 아직 없어요</div>'}</div>
      ${methodPills ? `<div class="method-strip">${methodPills}</div>` : ''}
    </div>`;
}

function renderList(){
  const list = entriesInMonth().slice().sort((a,b)=>{
    if(a.date!==b.date) return a.date<b.date?1:-1;
    return (b.createdAt||0)-(a.createdAt||0);
  });
  if(!list.length){
    el('list').innerHTML = `<div class="empty"><div class="big">🧾</div><div class="t">아직 매출 기록이 없어요</div><div class="s">아래 '매출 추가' 버튼으로 시작해보세요</div></div>`;
    return;
  }
  const groups = {};
  list.forEach(e=>{ (groups[e.date] = groups[e.date]||[]).push(e); });
  const html = Object.keys(groups).sort((a,b)=>a<b?1:-1).map(date=>{
    const rows = groups[date];
    const dsum = rows.reduce((s,e)=>s+(e.amount||0),0);
    const pd = prettyDate(date);
    const rowsHtml = rows.map(e=>{
      const c = catById(e.categoryId);
      const m = methodById(e.methodId);
      const initial = (c?c.name:'?').slice(0,1);
      return `
      <div class="entry" data-id="${e.id}">
        <div class="e-dot" style="background:${c?c.color:'#9B948A'}">${esc(initial)}</div>
        <div class="e-mid">
          <div class="e-cat">${esc(c?c.name:'삭제된 분류')}</div>
          <div class="e-meta">
            <span class="e-sub">${esc(m?m.name:'')}</span>
            ${e.memo?`<span>· ${esc(e.memo)}</span>`:''}
          </div>
        </div>
        <div class="e-amt num">${fmt(e.amount)}</div>
      </div>`;
    }).join('');
    return `
      <div class="day-group">
        <div class="day-head"><div><span class="d">${pd.day}</span><span class="dow">${pd.dow}</span></div><div class="dsum num">${fmt(dsum)}원</div></div>
        ${rowsHtml}
      </div>`;
  }).join('');
  el('list').innerHTML = html;
  document.querySelectorAll('.entry').forEach(node=>{
    node.onclick=()=>editEntry(node.dataset.id);
  });
}

function closeSheet(scrimId, sheetId){ el(scrimId).classList.remove('show'); el(sheetId).classList.remove('show'); }

function renderCatChips(){
  el('catChips').innerHTML = categories.map(c=>`
    <button class="chip ${selCat===c.id?'on':''}" data-cat="${c.id}" style="${selCat===c.id?`background:${c.color};border-color:${c.color}`:''}">

function renderMethodChips(){
  el('methodChips').innerHTML = methods.map(m=>`
    <button class="chip ${selMethod===m.id?'on':''}" data-method="${m.id}" style="${selMethod===m.id?`background:${m.color};border-color:${m.color}`:''}">

    b.onclick=()=>{ selMethod=b.dataset.method; renderMethodChips(); validate(); };

function newEntry(){
  editingId=null;
  selCat=null; selMethod=null;
  el('entryTitle').textContent='매출 추가';
  el('amount').value=''; el('date').value=ymd(new Date()); el('memo').value='';
  el('deleteEntry').style.display='none';
  renderCatChips(); renderMethodChips(); validate();
  openSheet('scrimEntry','sheetEntry');
}

function editEntry(id){
  const e = entries.find(x=>x.id===id); if(!e) return;
  editingId=id;
  selCat=e.categoryId; selMethod=e.methodId;
  el('entryTitle').textContent='매출 수정';
  el('amount').value = e.amount ? Number(e.amount).toLocaleString('ko-KR') : '';
  el('date').value = e.date||ymd(new Date());
  el('memo').value = e.memo||'';
  el('deleteEntry').style.display='';
  renderCatChips(); renderMethodChips(); validate();
  openSheet('scrimEntry','sheetEntry');
}

el('amount').addEventListener('input',e=>{
  const digits=e.target.value.replace(/[^0-9]/g,'').slice(0,12);
  e.target.value = digits ? Number(digits).toLocaleString('ko-KR') : '';
  validate();
});
function amountValue(){ return Number(el('amount').value.replace(/[^0-9]/g,''))||0; }
function validate(){ el('saveEntry').disabled = !(amountValue()>0 && selCat && selMethod); }

async function saveEntryNow(){
  const amount=amountValue(); if(!(amount>0)||!selCat||!selMethod) return;
  const c=catById(selCat), m=methodById(selMethod);
  const id=editingId||uid();
  const rec={
    id, date:el('date').value||ymd(new Date()), amount,
    categoryId:selCat, categoryName:c?c.name:'',
    methodId:selMethod, methodName:m?m.name:'',
    memo:el('memo').value.trim(),
    createdAt: editingId ? (entries.find(x=>x.id===id)?.createdAt||Date.now()) : Date.now()
  };
  if(editingId){ const i=entries.findIndex(x=>x.id===id); entries[i]=rec; }
  else entries.push(rec);
  await saveEntries();
  syncEntry(rec);
  closeSheet('scrimEntry','sheetEntry');
  renderAll();
  toast(editingId?'수정했어요':'저장했어요');
}

async function deleteEntryNow(){
  if(!editingId) return;
  if(!confirm('이 매출 기록을 삭제할까요?')) return;
  entries=entries.filter(x=>x.id!==editingId);
  await saveEntries();
  if(cloudConnected) entRef.child(editingId).remove().catch(err=>console.warn(err));
  closeSheet('scrimEntry','sheetEntry');
  renderAll();
  toast('삭제했어요');
}

/* ============================================================
   SETTINGS  ·  분류 / 결제수단 관리 (공용 로직)
   ============================================================ */
function listByType(type){ return type==='cat' ? categories : methods; }
function refByType(type){ return type==='cat' ? catRef : methodRef; }
function saveByType(type){ return type==='cat' ? saveCategories() : saveMethods(); }
function syncByType(type,item){ return type==='cat' ? syncCat(item) : syncMethod(item); }
function chipsRenderByType(type){ return type==='cat' ? renderCatChips : renderMethodChips; }

function openSettings(){ setTab('cat'); openSheet('scrimSettings','sheetSettings'); }

function setTab(tab){
  activeTab=tab;
  el('tabCat').classList.toggle('on', tab==='cat');
  el('tabMethod').classList.toggle('on', tab==='method');
  el('panelCat').classList.toggle('on', tab==='cat');
  el('panelMethod').classList.toggle('on', tab==='method');
  renderMgrPanel(tab);
}

function renderMgrPanel(type){
  const list = listByType(type);
  const label = type==='cat' ? '판매상품 분류' : '결제수단';
  let html = list.map(item=>`
    <div class="cat-card" data-id="${item.id}">
      <span class="cdot" style="background:${item.color}"></span>
      <span class="cname">${esc(item.name)}</span>
      <button class="mini" data-edit="${item.id}" title="이름·색상 수정"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg></button>
    </div>`).join('');
  html += `<button class="add-cat-btn" data-addnew="1"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>${label} 추가</button>`;
  const panel = el(type==='cat'?'panelCat':'panelMethod');
  panel.innerHTML = html;
  panel.querySelectorAll('[data-edit]').forEach(b=>{ b.onclick=()=>openItemEdit(type, b.dataset.edit); });
  const addBtn = panel.querySelector('[data-addnew]');
  if(addBtn) addBtn.onclick=()=>openItemEdit(type, null);
}

function openItemEdit(type, id){
  editingItemType=type;
  editingItemId=id;
  const item = id ? listByType(type).find(x=>x.id===id) : null;
  el('itemEditTitle').textContent = item ? (type==='cat'?'분류 수정':'결제수단 수정') : (type==='cat'?'분류 추가':'결제수단 추가');
  el('itemName').value = item ? item.name : '';
  itemEditColor = item ? item.color : PALETTE[listByType(type).length % PALETTE.length];
  renderItemSwatches();
  el('itemEditDelete').style.display = item ? '' : 'none';
  openSheet('scrimItemEdit','sheetItemEdit');
}

function renderItemSwatches(){
  el('itemSwatches').innerHTML = PALETTE.map(col=>`<button class="sw ${col===itemEditColor?'on':''}" data-col="${col}" style="background:${col}"></button>`).join('');
  document.querySelectorAll('#itemSwatches .sw').forEach(b=>{
    b.onclick=()=>{ itemEditColor=b.dataset.col; renderItemSwatches(); };
  });
}

async function saveItemEdit(){
  const name = el('itemName').value.trim();
  if(!name){ toast('이름을 입력해주세요'); return; }
  const type = editingItemType;
  const list = listByType(type);
  let item;
  if(editingItemId){
    item = list.find(x=>x.id===editingItemId);
    item.name = name; item.color = itemEditColor;
  }else{
    item = { id: uid(), name, color: itemEditColor };
    list.push(item);
  }
  await saveByType(type);
  syncByType(type, item);
  chipsRenderByType(type)();
  closeSheet('scrimItemEdit','sheetItemEdit');
  renderMgrPanel(type);
  renderAll();
  toast('저장했어요');
}

async function deleteItemNow(){
  if(!editingItemId) return;
  const type = editingItemType;
  const list = listByType(type);
  const used = entries.filter(e=> type==='cat' ? e.categoryId===editingItemId : e.methodId===editingItemId).length;
  const label = type==='cat' ? '분류' : '결제수단';
  const msg = used
    ? `이 ${label}로 기록한 매출이 ${used}건 있어요.\n삭제해도 기존 기록은 그대로 남습니다. 삭제할까요?`
    : `이 ${label}를 삭제할까요?`;
  if(!confirm(msg)) return;
  const delId = editingItemId;
  const idx = list.findIndex(x=>x.id===delId);
  if(idx>-1) list.splice(idx,1);
  await saveByType(type);
  if(cloudConnected) refByType(type).child(delId).remove().catch(err=>console.warn(err));
  chipsRenderByType(type)();
  closeSheet('scrimItemEdit','sheetItemEdit');
  renderMgrPanel(type);
  renderAll();
  toast('삭제했어요');
}

/* ============================================================
   EXPORT  ·  CSV / backup / restore
   ============================================================ */
function download(filename,text,type){
  const blob=new Blob([text],{type:type||'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },500);
}
function csvCell(v){ const s=String(v); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }

function exportCsv(){
  const rows=entries.slice().sort((a,b)=> a.date<b.date?1:a.date>b.date?-1:0);
  const head=['날짜','판매상품 분류','결제수단','결제금액','메모'];
  const body=rows.map(e=>[ e.date, e.categoryName||'', e.methodName||'', e.amount, (e.memo||'').replace(/\n/g,' ') ].map(csvCell).join(','));
  const total=rows.reduce((s,e)=>s+(e.amount||0),0);
  body.push(['','','합계',total,''].map(csvCell).join(','));
  const csv='\uFEFF'+[head.map(csvCell).join(','),...body].join('\r\n');
  download(`매출장부_${monthKey(new Date())}.csv`, csv, 'text/csv;charset=utf-8');
  closeMenu(); toast('CSV로 내보냈어요');
}

async function backup(){
  const data={ app:'jejeunosity-sales-ledger', version:1, exportedAt:new Date().toISOString(), categories, methods, entries };
  download(`매출장부_백업_${ymd(new Date())}.json`, JSON.stringify(data), 'application/json');
  closeMenu(); toast('백업 파일을 내려받았어요');
}

el('restoreInput').onchange=async(ev)=>{
  const file=ev.target.files[0]; ev.target.value=''; if(!file) return;
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    if(!data.entries||!data.categories||!data.methods) throw new Error('형식 오류');
    const confirmMsg = cloudConnected
      ? '백업을 불러오면 현재 데이터를 덮어씁니다 (연결된 다른 기기에도 반영돼요). 계속할까요?'
      : '백업을 불러오면 현재 데이터를 덮어씁니다. 계속할까요?';
    if(!confirm(confirmMsg)) return;
    categories=normalizeItems(data.categories); methods=normalizeItems(data.methods); entries=data.entries;
    await saveCategories(); await saveMethods(); await saveEntries();
    if(cloudConnected){
      const catObj={}; categories.forEach(c=>catObj[c.id]=c);
      const methodObj={}; methods.forEach(m=>methodObj[m.id]=m);
      const entObj={}; entries.forEach(e=>entObj[e.id]=e);
      await catRef.set(catObj);
      await methodRef.set(methodObj);
      await entRef.set(entObj);
    }
    renderCatChips(); renderMethodChips();
    renderAll(); toast('복원했어요');
  }catch(e){ alert('불러오기에 실패했어요. 올바른 백업 파일인지 확인해 주세요.'); }
};

/* ============================================================
   MENU + bindings
   ============================================================ */
function toast(msg){ const t=el('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1900); }
function closeMenu(){ el('menu').classList.remove('show'); }

function bind(){
  el('fab').onclick=newEntry;
  el('closeEntry').onclick=()=>closeSheet('scrimEntry','sheetEntry');
  el('scrimEntry').onclick=()=>closeSheet('scrimEntry','sheetEntry');
  el('saveEntry').onclick=saveEntryNow;
  el('deleteEntry').onclick=deleteEntryNow;

  el('btnSettings').onclick=openSettings;
  el('closeSettings').onclick=()=>closeSheet('scrimSettings','sheetSettings');
  el('scrimSettings').onclick=()=>closeSheet('scrimSettings','sheetSettings');
  el('tabCat').onclick=()=>setTab('cat');
  el('tabMethod').onclick=()=>setTab('method');

  el('closeItemEdit').onclick=()=>closeSheet('scrimItemEdit','sheetItemEdit');
  el('scrimItemEdit').onclick=()=>closeSheet('scrimItemEdit','sheetItemEdit');
  el('itemEditSave').onclick=saveItemEdit;
  el('itemEditDelete').onclick=deleteItemNow;

  el('prevM').onclick=()=>{ viewMonth.setMonth(viewMonth.getMonth()-1); renderAll(); };
  el('nextM').onclick=()=>{ viewMonth.setMonth(viewMonth.getMonth()+1); renderAll(); };

  el('btnMenu').onclick=(e)=>{ e.stopPropagation(); el('menu').classList.toggle('show'); };
  document.addEventListener('click',(e)=>{ if(!el('menu').contains(e.target) && e.target!==el('btnMenu')) closeMenu(); });
  el('mExportCsv').onclick=exportCsv;
  el('mBackup').onclick=backup;
  el('mRestore').onclick=()=>{ closeMenu(); el('restoreInput').click(); };
}

init();
</script>
